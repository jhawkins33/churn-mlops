name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python — syntax & drift regression test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          python -m py_compile src/*.py pipelines/*.py

      - name: Drift detection regression test
        run: |
          python src/detect_drift.py \
            --input tests/fixtures/sample_processed.csv \
            --baseline tests/fixtures/sample_baseline.json \
            --fail-on-drift

  terraform-checks:
    name: Terraform — format & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend — no AWS credentials needed)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate